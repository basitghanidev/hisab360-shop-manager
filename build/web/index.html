<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Hisab360 - Professional Shop Management">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Hisab360">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Hisab360</title>
  <link rel="manifest" href="manifest.json">

  <script src="flutter.js" defer></script>
</head>
<body style="background-color: #F5F7FA;">
  <div id="loading" style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; font-family: sans-serif; color: #555;">
    <img src="favicon.png" style="width: 80px; height: 80px; margin-bottom: 20px;" />
    <div style="font-size: 18px; font-weight: bold;">Hisab360</div>
    <div id="status" style="margin-top: 10px; font-size: 14px;">Initializing system...</div>
    <!-- Fixed error log ID to match the script below -->
    <div id="error-log" style="margin-top: 20px; color: red; font-size: 12px; max-width: 80%; text-align: center; font-family: monospace; white-space: pre-wrap;"></div>
  </div>

  <script>
    // Universal Error Catcher - Fixed ID mismatch
    window.onerror = function (msg, url, lineNo, columnNo, error) {
      console.error("Global Error: ", msg, " at ", url, ":", lineNo);
      var log = document.getElementById('error-log');
      if (log) {
        log.innerText = "CRASH DETECTED: " + msg + "\nLocation: " + url + ":" + lineNo;
      }
      return false;
    };

    window.addEventListener('load', function(ev) {
      const status = document.getElementById('status');
      if (status) status.innerText = "Loading engine...";

      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          if (status) status.innerText = "Starting dashboard...";
          engineInitializer.initializeEngine({
            // Force HTML renderer to solve the CanvasKit crash seen in console
            webRenderer: "html"
          }).then(function(appRunner) {
            appRunner.runApp();
            var loadingDiv = document.getElementById('loading');
            if (loadingDiv) loadingDiv.remove();
          }).catch(function(e) {
             console.error("Engine Init Error:", e);
             document.getElementById('error-log').innerText = "Engine Error: " + e;
          });
        }
      }).catch(function(e) {
          console.error("Load Error:", e);
          document.getElementById('error-log').innerText = "Load Error: " + e;
      });
    });
  </script>
</body>
</html>
