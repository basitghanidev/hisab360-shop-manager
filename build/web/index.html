<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Hisab360 - Professional Shop Management">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Hisab360">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Hisab360</title>
  <link rel="manifest" href="manifest.json">

  <script src="flutter.js" defer></script>
</head>
<body style="background-color: #F5F7FA;">
  <div id="loading" style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; font-family: sans-serif; color: #555;">
    <img src="favicon.png" style="width: 80px; height: 80px; margin-bottom: 20px;" />
    <div style="font-size: 18px; font-weight: bold;">Hisab360</div>
    <div id="status" style="margin-top: 10px; font-size: 14px;">Initializing system...</div>
    <div id="error-log" style="margin-top: 20px; color: red; font-size: 12px; max-width: 80%; text-align: center; font-family: monospace;"></div>
  </div>

  <script>
    // Universal Error Catcher - This will show us EXACTLY why it shows a white screen
    window.onerror = function (msg, url, lineNo, columnNo, error) {
      var log = document.getElementById('error-log');
      log.innerText = "CRASH DETECTED: " + msg + " (at line " + lineNo + ")";
      return false;
    };

    window.addEventListener('load', function(ev) {
      const status = document.getElementById('status');
      status.innerText = "Loading engine...";

      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          status.innerText = "Starting app...";
          engineInitializer.initializeEngine({
            webRenderer: "html"
          }).then(function(appRunner) {
            appRunner.runApp();
            document.getElementById('loading').remove();
          }).catch(function(e) {
             document.getElementById('error-log').innerText = "Engine Error: " + e;
          });
        }
      }).catch(function(e) {
          document.getElementById('error-log').innerText = "Load Error: " + e;
      });
    });
  </script>
</body>
</html>
