name: sentery_app
description: Shop Management — Professional local shop POS for Pakistan

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # === STATE MANAGEMENT ===
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # === NAVIGATION ===
  go_router: ^14.2.0
  
  # === DATABASE (SQLite - Offline First) ===
  drift: ^2.28.2
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.3
  path: ^1.9.0
  
  # === CHARTS ===
  fl_chart: ^0.68.0
  
  # === PDF & PRINTING ===
  pdf: ^3.11.0
  printing: ^5.13.0
  share_plus: ^10.1.0
  url_launcher: ^6.3.0
  
  # === CONNECTIVITY ===
  connectivity_plus: ^6.0.3
  
  # === BACKGROUND TASKS ===
  background_fetch: ^1.2.5
  
  # === UTILITIES ===
  intl: ^0.20.2
  uuid: ^4.4.2
  shared_preferences: ^2.3.2
  
  # === ICONS ===
  cupertino_icons: ^1.0.8
  cross_file: ^0.3.5+2
  collection: ^1.19.1
  decimal: ^3.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # === CODE GENERATION ===
  drift_dev: ^2.28.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  
  # === TESTING ===
  mockito: ^5.4.4
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
